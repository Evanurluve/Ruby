<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Typography Spatial Wave</title>
<style>
  :root{
    --bg:#0b0b0b; --panel:#141414; --text:#ffffff; --border:#262626;
    --font-size:75px; --line-height:0.88; --col-gap:0.74;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--bg); color:var(--text);
    font-family:'SF Mono','Monaco','Inconsolata','Roboto Mono',monospace;
    display:flex; height:100vh; overflow:hidden;
  }
  #captureArea{
    flex:1; display:flex; justify-content:center; align-items:center;
    background:var(--bg); padding:40px; position:relative; overflow:hidden;
  }
  .text-grid{ display:flex; flex-direction:column; line-height:var(--line-height); }
  .row{ display:flex; justify-content:space-between; column-gap:calc(var(--col-gap)*1em); }
  .word-group{ display:flex; letter-spacing:-0.02em; }
  .char{
    font-size:var(--font-size);
    display:inline-block; text-align:center; min-width:0.55em;
    color:var(--text);
    will-change: font-variation-settings, opacity;
  }

  .control-pane{
    width:380px; background:var(--panel); border-left:1px solid var(--border);
    display:flex; flex-direction:column; padding:20px; overflow-y:auto; z-index:10;
  }
  .panel-title{
    font-size:14px; font-weight:600; letter-spacing:1px; margin-bottom:20px;
    display:flex; align-items:center; gap:8px;
    border-bottom:1px solid var(--border); padding-bottom:12px;
  }
  .section-label{
    font-size:11px; color:#666; letter-spacing:1px; text-transform:uppercase;
    margin:18px 0 10px; border-top:1px solid var(--border); padding-top:14px;
  }
  .section-label:first-of-type{ border-top:none; margin-top:0; padding-top:0; }
  .control-group{ margin-bottom:14px; }
  .control-group label{
    display:flex; justify-content:space-between; font-size:12px; color:#a3a3a3; margin-bottom:6px;
  }
  .control-group input[type="text"], .control-group input[type="color"]{
    width:100%; background:#1f1f1f; border:1px solid var(--border); color:#fff;
    padding:6px; border-radius:4px; font-size:13px;
  }
  .control-group input[type="color"]{ height:36px; cursor:pointer; padding:2px; }
  .control-group input[type="range"]{ accent-color:#fff; cursor:pointer; width:100%; }
  .range-value{ font-family:monospace; color:#fff; font-size:11px; }
  .two-col{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  select{
    width:100%; background:#1f1f1f; border:1px solid var(--border); color:#fff;
    padding:6px; border-radius:4px; font-size:13px;
  }
  .checkbox-row{ display:flex; align-items:flex-start; gap:8px; margin-bottom:14px; }
  .checkbox-row input{ margin-top:3px; }
  .checkbox-row .cb-text{ font-size:12px; }
  .checkbox-row .cb-sub{ font-size:10px; color:#666; margin-top:2px; }
  .btn-row{ display:flex; gap:8px; margin-top:10px; }
  button{
    background:#333; color:#fff; border:none; padding:9px 12px; border-radius:4px;
    cursor:pointer; font-size:12px; flex:1;
  }
  button:hover{ background:#444; }
</style>
</head>
<body>

<div id="captureArea">
  <div class="text-grid" id="textGrid"></div>
</div>

<div class="control-pane">
  <div class="panel-title">A 排版参数微调</div>

  <div class="control-group">
    <label>显示文本</label>
    <input type="text" id="displayText" value="BREATHE OUT">
  </div>
  <div class="control-group">
    <label>字体颜色</label>
    <input type="color" id="textColorPicker" value="#ffffff">
  </div>

  <div class="section-label">字重极值范围</div>
  <div class="two-col">
    <div class="control-group">
      <label>最细字重 (Min)</label>
      <select id="wghtMin">
        <option value="100">100 (Thin)</option>
        <option value="300">300 (Light)</option>
        <option value="400">400 (Regular)</option>
      </select>
    </div>
    <div class="control-group">
      <label>最粗字重 (Max)</label>
      <select id="wghtMax">
        <option value="700">700 (Bold)</option>
        <option value="900" selected>900 (Black)</option>
      </select>
    </div>
  </div>

  <div class="section-label">波动特性 (Spatial Wave)</div>
  <div class="control-group">
    <label>全局波形位移 (Phase Shift) <span class="range-value" id="val-phase">4.50</span></label>
    <input type="range" id="phaseShift" min="0" max="10" step="0.05" value="4.5">
  </div>
  <div class="control-group">
    <label>行际相位偏差 (Row Offset) <span class="range-value" id="val-row">0.70</span></label>
    <input type="range" id="rowOffset" min="0" max="2" step="0.02" value="0.7">
  </div>
  <div class="control-group">
    <label>字际相位偏差 (Char Offset) <span class="range-value" id="val-char">0.20</span></label>
    <input type="range" id="charOffset" min="0" max="1" step="0.01" value="0.2">
  </div>

  <div class="section-label">排版网格 (Grid Settings)</div>
  <div class="control-group">
    <label>基准字号 (Font Size) <span class="range-value" id="val-size">75px</span></label>
    <input type="range" id="fontSize" min="30" max="140" step="1" value="75">
  </div>
  <div class="control-group">
    <label>横向间距比例 (Col Spacing) <span class="range-value" id="val-colgap">0.74</span></label>
    <input type="range" id="colGap" min="0" max="2" step="0.02" value="0.74">
  </div>
  <div class="control-group">
    <label>纵向行距比例 (Line Height) <span class="range-value" id="val-lh">0.88</span></label>
    <input type="range" id="lineHeight" min="0.5" max="2" step="0.01" value="0.88">
  </div>
  <div class="control-group">
    <label>行数 (Rows) <span class="range-value" id="val-rows">15</span></label>
    <input type="range" id="rowCount" min="3" max="30" step="1" value="15">
  </div>

  <div class="section-label">可选动态模拟</div>
  <div class="checkbox-row">
    <input type="checkbox" id="animateToggle">
    <div>
      <div class="cb-text">开启极缓自动位移</div>
      <div class="cb-sub">模拟缓缓流动的空气感</div>
    </div>
  </div>

  <div class="btn-row">
    <button id="resetBtn">↺ 还原经典排版比例</button>
    <button id="exportPngBtn">导出透明PNG</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>
const $ = id => document.getElementById(id);

const textGrid   = $('textGrid');
const displayText= $('displayText');
const textColor  = $('textColorPicker');
const wghtMin    = $('wghtMin');
const wghtMax    = $('wghtMax');
const phaseShift = $('phaseShift');
const rowOffset  = $('rowOffset');
const charOffset = $('charOffset');
const fontSize   = $('fontSize');
const colGap     = $('colGap');
const lineHeight = $('lineHeight');
const rowCountEl = $('rowCount');
const animateToggle = $('animateToggle');
const captureArea = $('captureArea');

let animPhase = 0;
let animId = null;
let cells = []; // {span, r, c}
let currentRows = 0, currentCols = 0;

const DEFAULTS = {
  displayText:'BREATHE OUT', textColor:'#ffffff', wghtMin:'100', wghtMax:'900',
  phaseShift:4.5, rowOffset:0.7, charOffset:0.2, fontSize:75, colGap:0.74,
  lineHeight:0.88, rowCount:15
};

// 只在文本/行数变化时重建 DOM 结构，其余参数变化只更新已有节点的样式（避免卡顿）
function buildGrid(){
  const text = displayText.value || ' ';
  const rows = parseInt(rowCountEl.value);
  textGrid.innerHTML = '';
  cells = [];
  currentRows = rows;
  currentCols = text.length;

  for(let r=0; r<rows; r++){
    const rowEl = document.createElement('div');
    rowEl.className = 'row';
    const group = document.createElement('div');
    group.className = 'word-group';
    for(let c=0; c<text.length; c++){
      const span = document.createElement('span');
      span.className = 'char';
      span.innerText = text[c];
      group.appendChild(span);
      cells.push({span, r, c});
    }
    rowEl.appendChild(group);
    textGrid.appendChild(rowEl);
  }
}

// 每帧/每次参数变化只更新样式，不重建 DOM —— 这是性能关键
function updateStyles(){
  const phase   = parseFloat(phaseShift.value) + animPhase;
  const rOff    = parseFloat(rowOffset.value);
  const cOff    = parseFloat(charOffset.value);
  const min     = parseInt(wghtMin.value);
  const max     = parseInt(wghtMax.value);
  const range   = max - min;

  document.documentElement.style.setProperty('--text', textColor.value);
  textGrid.style.setProperty('--font-size', fontSize.value + 'px');
  textGrid.style.setProperty('--line-height', lineHeight.value);
  textGrid.style.setProperty('--col-gap', colGap.value);

  for(const cell of cells){
    const angle = phase + (cell.r * rOff) + (cell.c * cOff);
    const sine = (Math.sin(angle) + 1) / 2;
    const weight = Math.round(min + sine * range);
    cell.span.style.fontVariationSettings = `'wght' ${weight}`;
    cell.span.style.color = textColor.value;
    cell.span.style.opacity = 0.15 + sine * 0.85;
  }
}

function updateLabels(){
  $('val-phase').innerText  = parseFloat(phaseShift.value).toFixed(2);
  $('val-row').innerText    = parseFloat(rowOffset.value).toFixed(2);
  $('val-char').innerText   = parseFloat(charOffset.value).toFixed(2);
  $('val-size').innerText   = fontSize.value + 'px';
  $('val-colgap').innerText = parseFloat(colGap.value).toFixed(2);
  $('val-lh').innerText     = parseFloat(lineHeight.value).toFixed(2);
  $('val-rows').innerText   = rowCountEl.value;
}

function fullRender(){
  buildGrid();
  updateLabels();
  updateStyles();
}

function lightUpdate(){
  updateLabels();
  updateStyles();
}

// 结构性变化 -> 重建 DOM
[displayText, rowCountEl].forEach(el => el.addEventListener('input', fullRender));

// 纯样式变化 -> 只更新已有节点，不重建（流畅的关键）
[textColor, wghtMin, wghtMax, phaseShift, rowOffset, charOffset, fontSize, colGap, lineHeight]
  .forEach(el => el.addEventListener('input', lightUpdate));

// 极缓自动位移动画
function animate(){
  animPhase += 0.006;
  updateStyles();
  animId = requestAnimationFrame(animate);
}
animateToggle.addEventListener('change', () => {
  if(animateToggle.checked){
    animId = requestAnimationFrame(animate);
  }else{
    cancelAnimationFrame(animId);
    animPhase = 0;
    updateStyles();
  }
});

// 还原默认
$('resetBtn').addEventListener('click', () => {
  displayText.value = DEFAULTS.displayText;
  textColor.value = DEFAULTS.textColor;
  wghtMin.value = DEFAULTS.wghtMin;
  wghtMax.value = DEFAULTS.wghtMax;
  phaseShift.value = DEFAULTS.phaseShift;
  rowOffset.value = DEFAULTS.rowOffset;
  charOffset.value = DEFAULTS.charOffset;
  fontSize.value = DEFAULTS.fontSize;
  colGap.value = DEFAULTS.colGap;
  lineHeight.value = DEFAULTS.lineHeight;
  rowCountEl.value = DEFAULTS.rowCount;
  fullRender();
});

// 透明背景导出
$('exportPngBtn').addEventListener('click', () => {
  const prevBg = captureArea.style.backgroundColor;
  captureArea.style.backgroundColor = 'transparent';
  html2canvas(captureArea, { backgroundColor:null, scale:2, logging:false })
    .then(canvas => {
      const link = document.createElement('a');
      link.download = 'typography_transparent.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
      captureArea.style.backgroundColor = prevBg || 'var(--bg)';
    });
});

fullRender();
</script>
</body>
</html>
