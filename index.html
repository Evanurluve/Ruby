  <!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Mobile Web</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --phone-width: 375px;
            --phone-height: 812px;
            --phone-radius: 40px;
            --phone-border: 10px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f2f5;
            margin: 0;
            transition: background 0.3s;
        }

        /* 手机容器 */
        .phone-mockup {
            width: var(--phone-width);
            height: var(--phone-height);
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: var(--phone-radius);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: var(--phone-border) solid rgba(255, 255, 255, 0.3);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 全屏模式下的样式覆盖 */
        .phone-mockup.fullscreen {
            width: 100vw !important;
            height: 100vh !important;
            border-radius: 0 !important;
            border: none !important;
        }

        .ios-blur { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .hidden { display: none !important; }
        
        /* 消息滚动区域 */
        #messages-container { scroll-behavior: smooth; }
        .message-bubble { max-width: 80%; padding: 10px 14px; border-radius: 20px; word-wrap: break-word; }
        .message-bubble.user { background-color: #0B84FF; color: white; align-self: flex-end; border-bottom-right-radius: 5px; }
        .message-bubble.ai { background-color: #E5E5EA; color: black; align-self: flex-start; border-bottom-left-radius: 5px; }
    </style>
</head>
<body>

    <div id="app-container" class="phone-mockup">
        <div id="status-bar" class="h-12 flex justify-between items-center px-6 pt-4 bg-white/80 ios-blur sticky top-0 z-50">
            <span class="font-bold text-sm">9:41</span>
            <div class="flex gap-1.5 items-center">
                <div class="w-4 h-4 bg-black rounded-full"></div>
                <div class="w-5 h-3 border border-black rounded-sm text-[8px] flex items-center justify-center">100%</div>
            </div>
        </div>

        <main class="flex-1 overflow-y-auto pb-24" id="main-content">
            <section id="view-chat" class="p-4">
                <h2 class="text-3xl font-bold mb-6">聊天</h2>
                <div id="chat-list" class="space-y-2"></div>
            </section>

            <section id="view-individual-chat" class="hidden h-full flex flex-col">
                <div class="flex items-center p-4 bg-white/80 ios-blur border-b border-gray-200">
                    <button onclick="goBackToChatList()" class="text-blue-600 font-semibold flex items-center">‹ 聊天</button>
                    <h3 class="flex-1 text-center font-bold text-lg" id="individual-chat-title">AI</h3>
                    <div class="w-12"></div>
                </div>
                <div id="messages-container" class="flex-1 overflow-y-auto p-4 space-y-3 flex flex-col"></div>
                <div class="p-3 bg-white/80 ios-blur border-t border-gray-200 flex items-end">
                    <input type="text" id="chat-input" placeholder="输入信息" class="flex-1 p-2 rounded-2xl bg-gray-100 outline-none mr-2">
                    <button onclick="sendUserMessage()" class="bg-blue-600 text-white p-2 rounded-full w-9 h-9 flex items-center justify-center mr-1">↑</button>
                    <button onclick="triggerAIMessage()" class="bg-gray-200 p-2 rounded-full w-9 h-9 flex items-center justify-center">💬</button>
                </div>
            </section>

            <section id="view-settings" class="p-4 hidden">
                <h2 class="text-3xl font-bold mb-6">设置</h2>
                
                <div class="space-y-6">
                    <div class="bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-100">
                        <div class="p-4 border-b">
                            <label class="block text-xs font-semibold text-gray-400 uppercase">接口地址</label>
                            <input type="text" id="api-url" class="w-full mt-1 outline-none text-blue-600" placeholder="https://api.openai.com/v1">
                        </div>
                        <div class="p-4">
                            <label class="block text-xs font-semibold text-gray-400 uppercase">API Key</label>
                            <input type="password" id="api-key" class="w-full mt-1 outline-none text-blue-600" placeholder="sk-...">
                        </div>
                    </div>

                    <div class="bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-100">
                        <div class="p-4 border-b flex justify-between items-center">
                            <span class="font-medium text-gray-700">全屏自适应</span>
                            <input type="checkbox" id="toggle-fullscreen" onchange="updateAppearance()" class="w-5 h-5">
                        </div>
                        <div class="p-4 border-b flex justify-between items-center">
                            <span class="font-medium text-gray-700">显示状态栏</span>
                            <input type="checkbox" id="toggle-status-bar" onchange="updateAppearance()" checked class="w-5 h-5">
                        </div>
                        <div id="size-settings" class="p-4 space-y-3">
                            <div class="flex items-center justify-between gap-4">
                                <span class="text-sm text-gray-500">宽度 (px)</span>
                                <input type="number" id="input-width" value="375" oninput="updateAppearance()" class="w-20 bg-gray-50 p-1 rounded border text-center">
                            </div>
                            <div class="flex items-center justify-between gap-4">
                                <span class="text-sm text-gray-500">高度 (px)</span>
                                <input type="number" id="input-height" value="812" oninput="updateAppearance()" class="w-20 bg-gray-50 p-1 rounded border text-center">
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <nav id="bottom-nav" class="w-full bg-white/80 ios-blur border-t border-gray-200 safe-area-bottom z-50">
            <div class="flex justify-around items-center h-16">
                <button onclick="switchTab('chat')" id="tab-chat" class="flex flex-col items-center text-blue-600"><span class="text-xl">💬</span><span class="text-[10px]">聊天</span></button>
                <button onclick="switchTab('settings')" id="tab-settings" class="flex flex-col items-center text-gray-400"><span class="text-xl">⚙️</span><span class="text-[10px]">设置</span></button>
            </div>
        </nav>
    </div>

    <script>
        // --- 核心逻辑：外观控制 ---
        function updateAppearance() {
            const isFullscreen = document.getElementById('toggle-fullscreen').checked;
            const showStatus = document.getElementById('toggle-status-bar').checked;
            const w = document.getElementById('input-width').value;
            const h = document.getElementById('input-height').value;
            const app = document.getElementById('app-container');
            const sizeControls = document.getElementById('size-settings');

            // 处理全屏
            if (isFullscreen) {
                app.classList.add('fullscreen');
                sizeControls.classList.add('hidden');
                document.body.style.backgroundColor = "white";
            } else {
                app.classList.remove('fullscreen');
                sizeControls.classList.remove('hidden');
                document.body.style.backgroundColor = "#f0f2f5";
                document.documentElement.style.setProperty('--phone-width', w + 'px');
                document.documentElement.style.setProperty('--phone-height', h + 'px');
            }

            // 处理状态栏
            document.getElementById('status-bar').style.display = showStatus ? 'flex' : 'none';
            
            // 保存设置到本地
            const settings = { isFullscreen, showStatus, w, h };
            localStorage.setItem('app_appearance', JSON.stringify(settings));
        }

        // --- 之前的聊天逻辑 (保留并微调) ---
        const contacts = [{ id: 'ai_1', name: 'AI 助手', avatar: 'https://via.placeholder.com/40/007AFF/FFFFFF?text=AI', lastMessage: '你好！', lastTime: '现在' }];
        
        function renderChatList() {
            const list = document.getElementById('chat-list');
            list.innerHTML = contacts.map(c => `
                <div onclick="openIndividualChat('${c.id}')" class="flex items-center p-3 bg-white rounded-xl shadow-sm cursor-pointer">
                    <img src="${c.avatar}" class="w-10 h-10 rounded-full mr-3">
                    <div class="flex-1"><div class="flex justify-between font-semibold"><span>${c.name}</span><span class="text-xs text-gray-400">${c.lastTime}</span></div>
                    <p class="text-sm text-gray-500">${c.lastMessage}</p></div>
                </div>
            `).join('');
        }

        function openIndividualChat(id) {
            document.getElementById('view-chat').classList.add('hidden');
            document.getElementById('view-individual-chat').classList.remove('hidden');
        }

        function goBackToChatList() {
            document.getElementById('view-individual-chat').classList.add('hidden');
            document.getElementById('view-chat').classList.remove('hidden');
        }

        function switchTab(tab) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(`view-${tab}`).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(b => b.classList.replace('text-blue-600', 'text-gray-400'));
            document.getElementById(`tab-${tab}`).classList.replace('text-gray-400', 'text-blue-600');
            if(tab === 'chat') goBackToChatList();
        }

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `message-bubble ${type} ${type === 'user' ? 'self-end' : 'self-start'}`;
            div.textContent = text;
            document.getElementById('messages-container').appendChild(div);
            document.getElementById('messages-container').scrollTop = document.getElementById('messages-container').scrollHeight;
        }

        function sendUserMessage() {
            const input = document.getElementById('chat-input');
            if (input.value) { addMessage(input.value, 'user'); input.value = ''; }
        }

        function triggerAIMessage() {
            addMessage('正在生成...', 'ai');
        }

        // 页面加载初始化
        window.onload = () => {
            renderChatList();
            // 加载保存的外观设置
            const saved = JSON.parse(localStorage.getItem('app_appearance') || '{}');
            if (saved.isFullscreen !== undefined) {
                document.getElementById('toggle-fullscreen').checked = saved.isFullscreen;
                document.getElementById('toggle-status-bar').checked = saved.showStatus;
                document.getElementById('input-width').value = saved.w || 375;
                document.getElementById('input-height').value = saved.h || 812;
                updateAppearance();
            }
        };
    </script>
</body>
</html>
