<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Mobile Web</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f2f5; /* 页面背景色 */
            margin: 0;
            overflow: hidden; /* 防止body滚动 */
        }
        .phone-mockup {
            width: 375px; /* 模拟 iPhone X/XS/11 Pro 的宽度 */
            height: 812px; /* 模拟 iPhone X/XS/11 Pro 的高度 */
            background-color: rgba(255, 255, 255, 0.8); /* 容器背景，更透明一些 */
            border-radius: 40px; /* 模拟手机的圆角 */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15), 0 0 0 1px rgba(255, 255, 255, 0.6) inset; /* 手机边框和阴影 */
            overflow: hidden; /* 内部内容不会溢出 */
            position: relative;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 10px solid rgba(255, 255, 255, 0.3); /* 模拟手机边框的透明度 */
        }
        .ios-blur {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .safe-area-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }
        .hidden { display: none; }
        /* 模拟iOS滚动条 */
        ::-webkit-scrollbar { width: 0px; }

        /* iMessage 样式 */
        .message-bubble {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 20px;
            position: relative;
            word-wrap: break-word;
        }
        .message-bubble.user {
            background-color: #0B84FF;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 5px; /* 尖角效果 */
        }
        .message-bubble.ai {
            background-color: #E5E5EA;
            color: black;
            align-self: flex-start;
            border-bottom-left-radius: 5px; /* 尖角效果 */
        }
    </style>
</head>
<body>

    <div class="phone-mockup">
        <div class="h-12 flex justify-between items-center px-6 pt-4 bg-white/80 ios-blur sticky top-0 z-50">
            <span class="font-bold text-sm">9:41</span>
            <div class="flex gap-1.5 items-center">
                <div class="w-4 h-4 bg-black rounded-full"></div>
                <div class="w-5 h-3 border border-black rounded-sm"></div>
            </div>
        </div>

        <main class="flex-1 overflow-y-auto pb-24" id="main-content">
            
            <section id="view-chat" class="p-4">
                <h2 class="text-3xl font-bold mb-6">聊天</h2>
                <div id="chat-list" class="space-y-2">
                    </div>
            </section>

            <section id="view-individual-chat" class="hidden h-full flex flex-col">
                <div class="flex items-center p-4 bg-white/80 ios-blur border-b border-gray-200">
                    <button onclick="goBackToChatList()" class="text-blue-600 font-semibold flex items-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-1" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z" clip-rule="evenodd" />
                        </svg>
                        聊天
                    </button>
                    <h3 class="flex-1 text-center font-bold text-lg" id="individual-chat-title">AI 助手</h3>
                    <div class="w-16"></div> </div>

                <div id="messages-container" class="flex-1 overflow-y-auto p-4 space-y-3 flex flex-col">
                    <div class="message-bubble ai">你好！今天有什么我可以帮你的吗？</div>
                </div>

                <div class="p-3 bg-white/80 ios-blur border-t border-gray-200 safe-area-bottom flex items-end">
                    <input type="text" id="chat-input" placeholder="输入信息" class="flex-1 p-2 rounded-2xl bg-gray-100 border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 mr-2">
                    <button onclick="sendUserMessage()" class="bg-blue-600 text-white p-2 rounded-full w-9 h-9 flex items-center justify-center mr-1">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" />
                        </svg>
                    </button>
                    <button onclick="triggerAIMessage()" class="bg-gray-200 text-gray-700 p-2 rounded-full w-9 h-9 flex items-center justify-center">
                        💬
                    </button>
                </div>
            </section>

            <section id="view-world" class="p-4 hidden">
                <h2 class="text-3xl font-bold mb-6">世界书</h2>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-blue-500 h-32 rounded-2xl p-4 text-white flex flex-col justify-end">
                        <span class="font-bold">设定集 A</span>
                    </div>
                    <div class="bg-purple-500 h-32 rounded-2xl p-4 text-white flex flex-col justify-end">
                        <span class="font-bold">历史背景</span>
                    </div>
                </div>
            </section>

            <section id="view-settings" class="p-4 hidden">
                <h2 class="text-3xl font-bold mb-6">设置</h2>
                <div class="bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-100">
                    <div class="p-4 border-b">
                        <label class="block text-xs font-semibold text-gray-400 uppercase">API URL</label>
                        <input type="text" id="api-url" placeholder="https://api.openai.com/v1" class="w-full mt-1 outline-none text-blue-600">
                    </div>
                    <div class="p-4">
                        <label class="block text-xs font-semibold text-gray-400 uppercase">API KEY</label>
                        <input type="password" id="api-key" placeholder="sk-...." class="w-full mt-1 outline-none text-blue-600">
                    </div>
                </div>
                <p class="mt-4 px-2 text-gray-400 text-xs">所有的 Key 均保存在本地浏览器缓存中。</p>
            </section>

        </main>

        <nav class="w-full bg-white/80 ios-blur border-t border-gray-200 safe-area-bottom z-50">
            <div class="flex justify-around items-center h-16">
                <button onclick="switchTab('chat')" class="flex flex-col items-center text-blue-600" id="tab-chat">
                    <div class="w-6 h-6 mb-1">💬</div>
                    <span class="text-[10px]">聊天</span>
                </button>
                <button onclick="switchTab('world')" class="flex flex-col items-center text-gray-400" id="tab-world">
                    <div class="w-6 h-6 mb-1">📖</div>
                    <span class="text-[10px]">世界书</span>
                </button>
                <button onclick="switchTab('settings')" class="flex flex-col items-center text-gray-400" id="tab-settings">
                    <div class="w-6 h-6 mb-1">⚙️</div>
                    <span class="text-[10px]">设置</span>
                </button>
            </div>
        </nav>
    </div>

    <script>
        const chatList = document.getElementById('chat-list');
        const messagesContainer = document.getElementById('messages-container');
        const chatInput = document.getElementById('chat-input');
        const individualChatTitle = document.getElementById('individual-chat-title');

        // 模拟聊天对象数据
        const contacts = [
            { id: 'ai_assistant', name: 'AI 助手', avatar: 'https://via.placeholder.com/40/007AFF/FFFFFF?text=AI', lastMessage: '你好！今天有什么我可以帮你的吗？', lastTime: '刚刚' },
            { id: 'smart_bot', name: '智能机器人', avatar: 'https://via.placeholder.com/40/34C759/FFFFFF?text=SB', lastMessage: '了解了，请继续。', lastTime: '1小时前' },
            { id: 'helper_ai', name: '辅助 AI', avatar: 'https://via.placeholder.com/40/FF9500/FFFFFF?text=HA', lastMessage: '好的，我准备好了。', lastTime: '昨天' },
        ];

        let currentChatId = null; // 当前活跃的聊天ID

        // 渲染聊天列表
        function renderChatList() {
            chatList.innerHTML = ''; // 清空现有列表
            contacts.forEach(contact => {
                const chatItem = document.createElement('div');
                chatItem.className = 'flex items-center p-3 bg-white rounded-xl shadow-sm border border-gray-100 cursor-pointer hover:bg-gray-50';
                chatItem.onclick = () => openIndividualChat(contact.id);
                chatItem.innerHTML = `
                    <img src="${contact.avatar}" class="w-10 h-10 rounded-full mr-3">
                    <div class="flex-1">
                        <div class="flex justify-between items-center">
                            <span class="font-semibold text-base">${contact.name}</span>
                            <span class="text-xs text-gray-400">${contact.lastTime}</span>
                        </div>
                        <p class="text-sm text-gray-500 truncate">${contact.lastMessage}</p>
                    </div>
                `;
                chatList.appendChild(chatItem);
            });
        }

        // 打开单个聊天界面
        function openIndividualChat(chatId) {
            currentChatId = chatId;
            const contact = contacts.find(c => c.id === chatId);
            if (contact) {
                individualChatTitle.textContent = contact.name;
            }
            document.getElementById('view-chat').classList.add('hidden');
            document.getElementById('view-individual-chat').classList.remove('hidden');
            scrollToBottom(); // 确保打开时滚动到底部
        }

        // 返回聊天列表
        function goBackToChatList() {
            currentChatId = null;
            document.getElementById('view-individual-chat').classList.add('hidden');
            document.getElementById('view-chat').classList.remove('hidden');
        }

        // 发送用户消息
        function sendUserMessage() {
            const messageText = chatInput.value.trim();
            if (messageText) {
                addMessage(messageText, 'user');
                chatInput.value = ''; // 清空输入框
                // 模拟 AI 自动回复
                setTimeout(() => {
                    addMessage('正在思考中...', 'ai');
                    scrollToBottom();
                }, 500);
                // 在此处可以调用真实的 API
            }
        }

        // 触发 AI 消息 (点击气泡按钮)
        function triggerAIMessage() {
            addMessage('AI 正在为您生成信息...', 'ai');
            scrollToBottom();
            // 在此处可以调用真实的 API 获取 AI 生成内容
            // 模拟 AI 生成一段内容
            setTimeout(() => {
                const randomMessages = [
                    '有什么我可以帮你的？',
                    '请告诉我你的问题。',
                    '很高兴为您服务！',
                    '我在这里等你哦。'
                ];
                const generatedMessage = randomMessages[Math.floor(Math.random() * randomMessages.length)];
                addMessage(generatedMessage, 'ai');
                scrollToBottom();
            }, 1500);
        }

        // 添加消息到聊天界面
        function addMessage(text, type) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message-bubble ${type} ${type === 'user' ? 'self-end' : 'self-start'}`;
            messageDiv.textContent = text;
            messagesContainer.appendChild(messageDiv);
            scrollToBottom();
        }

        // 滚动到最新消息
        function scrollToBottom() {
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // 切换 Tab 页
        function switchTab(tab) {
            // 隐藏所有内容区域
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            // 确保单个聊天界面隐藏，显示主聊天列表
            if (tab === 'chat') {
                document.getElementById('view-chat').classList.remove('hidden');
                goBackToChatList(); // 确保回到聊天列表页
            } else {
                document.getElementById(`view-${tab}`).classList.remove('hidden');
            }
            
            // 移除所有按钮高亮
            document.querySelectorAll('nav button').forEach(b => {
                b.classList.remove('text-blue-600');
                b.classList.add('text-gray-400');
            });
            // 高亮当前按钮
            document.getElementById(`tab-${tab}`).classList.add('text-blue-600');
            document.getElementById(`tab-${tab}`).classList.remove('text-gray-400');
        }

        // 本地存储 API URL 和 KEY
        const urlInput = document.getElementById('api-url');
        const keyInput = document.getElementById('api-key');

        urlInput.addEventListener('change', (e) => localStorage.setItem('api_url', e.target.value));
        keyInput.addEventListener('change', (e) => localStorage.setItem('api_key', e.target.value));

        // 页面加载完成时执行
        window.onload = () => {
            urlInput.value = localStorage.getItem('api_url') || '';
            keyInput.value = localStorage.getItem('api_key') || '';
            
            renderChatList(); // 渲染聊天列表
            switchTab('chat'); // 默认显示聊天主页
        };
    </script>
</body>
</html>
